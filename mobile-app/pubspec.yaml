name: veritag_app
description: The Veritag mobile app — artist studio + visitor passport, on veritag_sdk.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  veritag_sdk:
    path: ../sdk/dart/veritag_sdk
  crypto: ^3.0.3
  convert: ^3.1.1
  http: ^1.1.0
  shared_preferences: ^2.2.0   # remember the artist identity across launches
  image_picker: ^1.1.0         # attach a photo to an artwork at mint time

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
